<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <nav>
    <div class="logo">TEAM 4</div>
    <div>
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <section class="section">
    <h2>Shop Collection</h2>

    <div class="product-grid">

      <div class="product">
        <h3>Basic Tee</h3>
        <p class="price">$25</p>
        <button onclick="addToCart('Basic Tee')">Add to Cart</button>
      </div>

      <div class="product">
        <h3>Minimal Hoodie</h3>
        <p class="price">$55</p>
        <button onclick="addToCart('Minimal Hoodie')">Add to Cart</button>
      </div>

      <div class="product">
        <h3>Classic Pants</h3>
        <p class="price">$60</p>
        <button onclick="addToCart('Classic Pants')">Add to Cart</button>
      </div>

      <div class="product">
        <h3>Essential Jacket</h3>
        <p class="price">$75</p>
        <button onclick="addToCart('Essential Jacket')">Add to Cart</button>
      </div>

    </div>
  </section>

  <footer>
    <p>Team 4 E-Commerce Project</p>
  </footer>

  <script src="js/products.js"></script>
</body>
</html>
</html>
