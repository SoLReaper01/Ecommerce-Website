<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <nav>
    <div class="logo">TEAM 4</div>
    <div>
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="orders.html" id="ordersLink" style="display:none;">Orders</a>
      <a href="login.html" id="loginLink">Login</a>
      <a href="register.html" id="registerLink">Register</a>
      <a href="#" id="logoutLink" style="display:none;">Logout</a>
      <a href="admin.html" id="adminLink" style="display:none;">Admin</a>
    </div>
  </nav>

<section class="section">
  <h2>Your Cart</h2>

  <div id="cartContainer"></div>

  <template id="cartItemTemplate">
    <div class="cart-item">
      <h3 class="cartName"></h3>
      <p class="cartPrice"></p>
      <p>
        Quantity:
        <input type="number" class="cartQuantity" min="1">
      </p>
      <button class="removeBtn">Remove</button>
    </div>
  </template>

  <div class="cart-summary" id="cartSummary" style="display:none;">
    <h3 id="cartTotal">Total: $0</h3>
    <button onclick="checkout()">Checkout</button>
  </div>
</section>

  <footer>
    <p>Team 4 E-Commerce Project</p>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
