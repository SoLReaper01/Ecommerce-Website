<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <h1>Admin Dashboard</h1>

  <nav>
    <div class="logo">TEAM 4</div>
    <div>
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart</a>
      <a href="orders.html" id="ordersLink" style="display:none;">Orders</a>
      <a href="login.html" id="loginLink">Login</a>
      <a href="register.html" id="registerLink">Register</a>
      <a href="#" id="logoutLink" style="display:none;">Logout</a>
      <a href="admin.html" id="adminLink" style="display:none;">Admin</a>
    </div>
  </nav>

  <hr>

  <section>
    <h2>Add Products</h2>

    <form id="addProductForm">
      <label>Product Name:</label><br>
      <input type="text" id="name"><br><br>

      <label>Price:</label><br>
      <input type="number" id="price" step="0.01" min="0"><br><br>

      <label>Description:</label><br>
      <textarea id="description"></textarea><br><br>

      <label>Category:</label><br>
      <input type="text" id="category"><br><br>

      <label>Color:</label><br>
      <input type="text" id="color"><br><br>

      <label>Stock:</label><br>
      <input type="number" id="stock"><br><br>

      <button type="submit">Add Product</button>
    </form>
  </section>

  <hr>

  <section class="section">
    <h2>All Products</h2>
    <div id="adminProductList"></div>
  </section>
  
  <template id="productTemplate">
    <div class="admin-product">
      <h3 class="name"></h3>
      <p class="description"></p>
      <p class="price"></p>
      <p class="stock"></p>
      <p class="category"></p>
      <p class="color"></p>
      <button class="editBtn">Edit</button>
      <button class="deleteBtn">Delete</button>
      <hr>
    </div>
   </template>

  <section>
    <h2>Customer Orders</h2>
    <div id="adminOrderList"></div>
  </section>

  <template id="orderTemplate">
    <div class="order">
      <h3 class="orderId"></h3>
      <p class="customer"></p>
      <p class="email"></p>
      <p class="address"></p>
      <p class="total"></p>
      <p class="status"></p>

      <select class="statusSelect">
        <option>Pending</option>
        <option>Processing</option>
        <option>Shipped</option>
        <option>Delivered</option>
        <option>Cancelled</option>
      </select>

      <button class="updateStatusBtn">Update Status</button>

      <hr>
    </div>
  </template>

  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
