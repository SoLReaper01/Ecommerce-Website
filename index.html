<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Team 4 Apparel — E‑commerce Demo</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="#/products" aria-label="Team 4 Apparel home">
        <span class="brand-mark" aria-hidden="true">T4</span>
        <span class="brand-name">Team 4 Apparel</span>
      </a>

      <nav class="nav" aria-label="Primary">
        <a class="nav-link" href="#/products">Products</a>
        <a class="nav-link" href="#/about">About</a>
        <a class="nav-link" href="#/contact">Contact</a>
      </nav>

      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" type="button" title="Toggle theme" aria-label="Toggle theme">
          ☾
        </button>

        <a class="btn btn-ghost" id="authLink" href="#/login">Login</a>
        <a class="btn btn-ghost" id="registerLink" href="#/register">Register</a>

        <a class="btn btn-primary" href="#/cart" aria-label="Cart">
          Cart <span class="pill" id="cartCount" aria-label="Cart item count">0</span>
        </a>
      </div>

      <button class="hamburger" id="hamburger" type="button" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="mobile-nav" id="mobileNav" hidden>
      <a class="nav-link" href="#/products">Products</a>
      <a class="nav-link" href="#/about">About</a>
      <a class="nav-link" href="#/contact">Contact</a>
      <hr />
      <a class="nav-link" href="#/login" id="mobileAuthLink">Login</a>
      <a class="nav-link" href="#/register" id="mobileRegisterLink">Register</a>
      <a class="nav-link" href="#/cart">Cart</a>
      <hr />
      <a class="nav-link" href="#/account" id="mobileAccountLink" hidden>Account</a>
      <a class="nav-link" href="#/admin" id="mobileAdminLink" hidden>Admin</a>
      <button class="nav-link nav-link-btn" type="button" id="mobileLogoutBtn" hidden>Logout</button>
    </div>
  </header>

  <main id="main" class="container main">
    <div id="app" class="app" role="region" aria-label="Page content"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="muted">
        Demo e‑commerce site for COMP 380 — Team 4.
        <span class="dot" aria-hidden="true">•</span>
        <a href="#/security">Security &amp; Reliability</a>
      </p>
      <p class="muted small">
        This is a front‑end prototype (no real payments). Use a local server for best results.
      </p>
    </div>
  </footer>

  <script src="assets/app.js" defer></script>
</body>
</html>
